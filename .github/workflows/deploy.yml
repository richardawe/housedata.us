name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: https://housedata.us

      - name: Bundle standalone output
        run: |
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public
          cp server.js        .next/standalone/server.js

      - name: Deploy via rsync
        env:
          SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.CPANEL_SSH_PORT }}" \
            .next/standalone/ \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }}:${{ secrets.CPANEL_APP_PATH }}/

      - name: Restart Passenger
        env:
          SSH_KEY: ${{ secrets.CPANEL_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no -p ${{ secrets.CPANEL_SSH_PORT }} \
            ${{ secrets.CPANEL_USER }}@${{ secrets.CPANEL_HOST }} \
            "touch ${{ secrets.CPANEL_APP_PATH }}/tmp/restart.txt"
