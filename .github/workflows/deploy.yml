name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_URL: https://housedata.us

      - name: Bundle standalone output
        run: |
          cp -r .next/static  .next/standalone/.next/static
          cp -r public        .next/standalone/public

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          security: loose
          local-dir: .next/standalone/
          server-dir: /

      - name: Restart app
        run: |
          curl -sf -X POST https://housedata.us/api/deploy \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 15 || echo "Restart endpoint not yet live — restart PM2 manually"
