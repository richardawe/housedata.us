name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit
        env:
          NEXT_PUBLIC_BASE_URL: https://housedata.us

      - name: Trigger server build
        run: |
          curl -sf -X POST https://housedata.us/api/deploy \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 15
